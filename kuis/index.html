<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Harian Komputasi</title>
    <script src="https://cdn.jsdelivr.net/npm/sheetrock@2.2.1/dist/sheetrock.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { backdrop-filter: blur(10px); }
        .shadow-lg { box-shadow: 0 20px 25px -5px rgba(0, 0,0, 0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
            <div class="text-center">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                <p class="text-gray-600">Memuat...</p>
            </div>
        </div>

        <!-- Login Page -->
        <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
            <div class="bg-white/80 glass rounded-2xl shadow-2xl p-8 w-full max-w-md">
                <div class="text-center mb-8">
                    <i class="fas fa-brain text-5xl text-blue-600 mb-4"></i>
                    <h1 class="text-3xl font-bold text-gray-900">Kuis Harian</h1>
                    <p class="text-gray-600">Komputasi & Algoritma</p>
                </div>
                <form id="loginForm">
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                        <input type="text" id="username" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-8">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                        <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition duration-200">
                        <i class="fas fa-sign-in-alt mr-2"></i>Masuk
                    </button>
                </form>
                <div id="loginError" class="mt-4 hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl"></div>
            </div>
        </div>

        <!-- Main App -->
        <div id="mainApp" class="hidden">
            <!-- Navbar -->
            <nav class="bg-white/90 glass backdrop-blur-md shadow-lg border-b border-gray-200">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between h-16">
                        <div class="flex items-center">
                            <i class="fas fa-brain text-2xl text-blue-600 mr-3"></i>
                            <span class="text-xl font-bold text-gray-900" id="appTitle">Kuis Harian</span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <span id="userInfo" class="font-semibold text-gray-700"></span>
                            <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-medium transition duration-200">
                                <i class="fas fa-sign-out-alt mr-2"></i>Keluar
                            </button>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Sidebar -->
            <div class="flex overflow-hidden">
                <!-- Member Sidebar -->
                <div id="memberSidebar" class="hidden w-64 bg-white/90 glass shadow-lg border-r border-gray-200">
                    <div class="p-6">
                        <ul class="space-y-2">
                            <li><a href="#" onclick="showPage('dashboard')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-home mr-3"></i>Dashboard Harian</a></li>
                            <li><a href="#" onclick="showPage('leaderboard')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-trophy mr-3"></i>Leaderboard</a></li>
                            <li><a href="#" onclick="showPage('history')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-history mr-3"></i>Histori</a></li>
                            <li><a href="#" onclick="showPage('profile')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-user mr-3"></i>Profil</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Admin Sidebar -->
                <div id="adminSidebar" class="hidden w-64 bg-white/90 glass shadow-lg border-r border-gray-200">
                    <div class="p-6">
                        <ul class="space-y-2">
                            <li><a href="#" onclick="showPage('dashboard')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-chart-bar mr-3"></i>Dashboard</a></li>
                            <li><a href="#" onclick="showPage('questions')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-question-circle mr-3"></i>Bank Soal</a></li>
                            <li><a href="#" onclick="showPage('members')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-users mr-3"></i>Members</a></li>
                            <li><a href="#" onclick="showPage('stats')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-file-alt mr-3"></i>Statistik</a></li>
                            <li><a href="#" onclick="showPage('logs')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-clipboard-list mr-3"></i>Log Submisi</a></li>
                            <li><a href="#" onclick="showPage('profile')" class="flex items-center p-3 rounded-xl text-gray-700 hover:bg-blue-50 font-medium"><i class="fas fa-user mr-3"></i>Profil</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="flex-1 overflow-y-auto">
                    <!-- Pages Container -->
                    <div id="pagesContainer" class="p-8 max-w-7xl mx-auto">
                        <!-- Content will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
